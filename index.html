  <style>
    :root {
      --gold: #e3bf68;
      --gold-strong: #b88b2f;
      --black-1: #0b0b0d;
      --black-2: #151517;
      --green: #2d8c57;
      --green-soft: #79c79d;
      --card: rgba(20, 20, 22, 0.88);
      --text: #fff6df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', system-ui, sans-serif;
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(227, 191, 104, 0.24), transparent 60%),
        radial-gradient(900px 500px at 5% 90%, rgba(52, 140, 91, 0.2), transparent 68%),
        radial-gradient(900px 500px at 95% 86%, rgba(37, 112, 75, 0.19), transparent 64%),
        linear-gradient(180deg, #121215, #0b0b0d 45%, #060607);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
    }

    /* === JUNGLE BACKGROUND LAYER === */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
      background-image:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.25) 0 2px, transparent 2px),
        radial-gradient(circle at 75% 30%, rgba(255,255,255,0.2) 0 2px, transparent 2px),
        repeating-linear-gradient(45deg, rgba(227,191,104,0.08) 0 6px, transparent 6px 14px);
      background-size: 220px 220px, 260px 260px, 100% 100%;
    }

    .slot-wrapper {
      position: relative;
      width: min(440px, 100%);
      z-index: 1;
    }

    .app {
      width: 100%;
      border: 1px solid rgba(227, 191, 104, 0.55);
      border-radius: 24px;
      background: linear-gradient(160deg, rgba(26, 26, 29, 0.94), rgba(12, 12, 14, 0.96));
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.04);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ===== LEVER ===== */
    .lever-wrap {
      position: absolute;
      right: -52px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    /* The rail/column */
    .lever-rail {
      width: 14px;
      height: 180px;
      border-radius: 7px;
      background: linear-gradient(90deg, #2a2a2e, #3e3e44 40%, #252528);
      border: 1px solid rgba(227,191,104,0.35);
      box-shadow: inset 0 0 6px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
      position: relative;
    }

    /* groove inside rail */
    .lever-rail::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 8px;
      bottom: 8px;
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(180deg, #111, #222 50%, #111);
      box-shadow: inset 0 0 3px rgba(0,0,0,0.8);
    }

    /* The arm + ball group — animated */
    .lever-arm-group {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%) translateY(0px);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.12s cubic-bezier(0.4,0,0.6,1);
      will-change: transform;
    }

    .lever-arm-group.pulled {
      transform: translateX(-50%) translateY(130px);
      transition: transform 0.18s cubic-bezier(0.4,0,0.8,1);
    }

    .lever-arm-group.spring-back {
      transform: translateX(-50%) translateY(0px);
      transition: transform 0.38s cubic-bezier(0.22, 1.6, 0.36, 1);
    }

    /* The arm rod */
    .lever-arm {
      width: 6px;
      height: 60px;
      border-radius: 3px;
      background: linear-gradient(90deg, #c8a84a, #f0d070 45%, #b8942a);
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* The handle ball */
    .lever-ball {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 28%, #ff7a7a, #cc2020 55%, #7a0c0c);
      border: 2px solid rgba(255,120,120,0.7);
      box-shadow:
        inset 0 -3px 8px rgba(0,0,0,0.4),
        inset 0 3px 6px rgba(255,200,200,0.4),
        0 6px 18px rgba(180,20,20,0.55),
        0 2px 6px rgba(0,0,0,0.5);
      flex-shrink: 0;
      order: -1;
      transition: box-shadow 0.1s;
    }

    .lever-wrap:hover .lever-ball {
      box-shadow:
        inset 0 -3px 8px rgba(0,0,0,0.4),
        inset 0 3px 6px rgba(255,200,200,0.4),
        0 8px 24px rgba(220,40,40,0.7),
        0 2px 6px rgba(0,0,0,0.5);
    }

    /* Bottom stopper */
    .lever-stopper {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(180deg, #b88b2f, #7a5c18);
      border: 1px solid rgba(227,191,104,0.5);
    }

    /* Label under lever */
    .lever-label {
      margin-top: 8px;
      font-size: 0.55rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: rgba(227,191,104,0.7);
      text-transform: uppercase;
      text-align: center;
      line-height: 1.3;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* inner jungle slot frame decorations */
    .app::before,
    .app::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 160px;
      bottom: 24%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
      background: linear-gradient(160deg, rgba(121,199,157,0.7), rgba(45,140,87,0.2));
      clip-path: polygon(52% 0, 70% 15%, 84% 34%, 75% 58%, 56% 100%, 33% 64%, 16% 36%, 28% 16%);
      filter: blur(0.5px);
    }

    .app::before {
      left: -34px;
      transform: rotate(-14deg);
    }

    .app::after {
      right: -34px;
      transform: scaleX(-1) rotate(-10deg);
    }

    /* ===== HEADER ===== */
    .header {
      padding: 18px 18px 8px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .lenny-logo-wrap {
      display: grid;
      place-items: center;
      margin-bottom: 10px;
    }

    .lenny-logo {
      width: min(210px, 58vw);
      height: auto;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.38));
    }

    .slot-brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .thai-logo {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(227,191,104,0.7);
      box-shadow: 0 4px 10px rgba(0,0,0,0.32);
    }

    .slot-brand-text {
      margin: 0;
      color: var(--gold);
      font-size: clamp(1.05rem, 3.9vw, 1.3rem);
      font-weight: 900;
      letter-spacing: 0.35px;
      text-transform: uppercase;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.5px;
      color: rgba(255, 238, 190, 0.9);
      margin: 0;
      font-size: 0.84rem;
    }

    .title { display: none; }

    .subtitle {
      margin: 0;
      color: #d6cda9;
      font-size: 0.94rem;
      font-weight: 400;
    }

    /* ===== SLOT FRAME ===== */
    .slot-frame {
      margin: 14px 14px 8px;
      border-radius: 16px;
      border: 2px solid rgba(227, 191, 104, 0.72);
      background: linear-gradient(180deg, rgba(43, 131, 86, 0.16), rgba(0,0,0,0.34));
      padding: 14px 12px;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 10px 20px rgba(0,0,0,0.35);
    }

    /* small inline fern overlays on the slot frame sides */
    .slot-frame::before,
    .slot-frame::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 56px;
      pointer-events: none;
      z-index: 2;
    }

    .slot-frame::before {
      left: 0;
      border-radius: 16px 0 0 16px;
      background: linear-gradient(90deg, rgba(30,80,50,0.35), transparent);
    }

    .slot-frame::after {
      right: 0;
      border-radius: 0 16px 16px 0;
      background: linear-gradient(270deg, rgba(30,80,50,0.35), transparent);
    }

    .reels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .reel-window {
      height: 104px;
      border-radius: 14px;
      border: 1px solid rgba(227, 191, 104, 0.28);
      background: rgba(7, 7, 9, 0.82);
      overflow: hidden;
      position: relative;
    }

    .reel-window::before,
    .reel-window::after {
      content: "";
      position: absolute;
      left: 0; right: 0;
      height: 22px;
      z-index: 2;
      pointer-events: none;
    }

    .reel-window::before {
      top: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.55), transparent);
    }

    .reel-window::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.55), transparent);
    }

    .reel-strip {
      will-change: transform;
      transform: translateY(0);
    }

    .symbol {
      height: 104px;
      display: grid;
      place-items: center;
      padding: 8px 4px;
      text-align: center;
      user-select: none;
    }

    .symbol-badge {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 25%, #ffeec2, #e4c274 42%, #9f7423 100%);
      border: 2px solid rgba(227, 191, 104, 0.9);
      display: grid;
      place-items: center;
      font-size: 2rem;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.45), 0 6px 12px rgba(0,0,0,0.42);
    }

    .symbol-name {
      margin-top: 6px;
      font-size: 0.66rem;
      color: #f7eed7;
      letter-spacing: 0.3px;
      font-weight: 700;
      text-transform: uppercase;
      font-family: 'Poppins', sans-serif;
    }

    /* ===== CONTROLS ===== */
    .controls {
      padding: 12px 16px 4px;
    }

    .spin-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 1.05rem;
      font-weight: 800;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.7px;
      color: #151515;
      background: linear-gradient(180deg, #f5d88f 0%, #ddb45a 56%, #a97c29 100%);
      cursor: default;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(227, 191, 104, 0.32);
      text-transform: uppercase;
      opacity: 0.82;
    }

    .spin-btn[disabled] { opacity: 0.5; }

    /* ===== RESULT ===== */
    .result {
      margin: 10px 16px 16px;
      border-radius: 14px;
      background: var(--card);
      border: 1px solid rgba(121, 199, 157, 0.5);
      padding: 12px;
      display: none;
    }

    .result.show { display: block; }

    .result-title {
      margin: 0;
      color: #f4d58c;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .result-prize {
      margin: 6px 0 10px;
      font-size: 1.02rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .code-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .code {
      flex: 1;
      border: 1px dashed rgba(227,191,104,0.85);
      border-radius: 10px;
      padding: 10px;
      font-weight: 900;
      text-align: center;
      background: rgba(0,0,0,0.25);
      color: #ffe4a4;
      letter-spacing: 0.6px;
      font-family: 'Poppins', sans-serif;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(180deg, #3fa16e, #2c7d55);
    }

    .btn.secondary {
      width: 100%;
      margin-top: 2px;
      background: linear-gradient(180deg, #26262a, #17171a);
      border: 1px solid rgba(227,191,104,0.42);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status {
      min-height: 18px;
      margin: 6px 16px 14px;
      font-size: 0.82rem;
      color: #d7d1be;
      text-align: center;
      font-weight: 400;
    }

    .jackpot {
      color: #ffe3a3;
      text-shadow: 0 0 8px rgba(255, 212, 88, 0.6);
      animation: pulse 500ms ease-in-out 4;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    canvas#confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    @media (max-width: 500px) {
      body {
        padding: 12px 10px;
        align-items: flex-start;
        padding-top: 20px;
      }
      .slot-wrapper {
        width: 100%;
      }
    }
    @media (max-height: 700px) {
      body {
        align-items: flex-start;
        padding-top: 12px;
      }
    }

    /* ===== RESPONSIVE: lever stays visible on mobile ===== */
    @media (max-width: 560px) {
      body {
        /* Give right padding = lever overhang (52px) + base (16px) */
        padding: 20px 68px 20px 16px;
      }
    }
    @media (max-width: 380px) {
      body { padding: 16px 64px 16px 12px; }
      .symbol-badge { width: 58px; height: 58px; font-size: 1.6rem; }
      .reel-window { height: 90px; }
      .symbol { height: 90px; }
    }

    /* ===== LOGIN OVERLAY ===== */
    #loginOverlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6,6,7,0.92);
      backdrop-filter: blur(6px);
      padding: 20px;
    }
    .login-card {
      background: linear-gradient(160deg, #1a1a1f, #111114);
      border: 1.5px solid rgba(227,191,104,0.65);
      border-radius: 20px;
      padding: 36px 32px 32px;
      width: min(400px, 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
    }
    .login-card img.lc-logo { width: 160px; height: auto; margin-bottom: 18px; }
    .login-card h2 {
      color: var(--gold);
      font-size: 1.25rem;
      font-weight: 800;
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-card p {
      color: #c9c0a0;
      font-size: 0.85rem;
      margin: 0 0 22px;
    }
    .login-input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(227,191,104,0.4);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      color: #f5edd8;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-input::placeholder { color: rgba(200,185,145,0.5); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2d8c57, #1f6b3f);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-btn:active { transform: scale(0.98); }
    .login-error {
      color: #ff6b6b;
      font-size: 0.8rem;
      margin-top: 8px;
      min-height: 18px;
    }
    .login-note {
      margin-top: 14px;
      font-size: 0.75rem;
      color: rgba(180,165,130,0.65);
    }
  </style>
</head>

    const ORDER_URL = 'https://www.lenny.app/';

    const reels = [
      document.getElementById('reel0'),
      document.getElementById('reel1'),
      document.getElementById('reel2')
    ];

    const spinBtn = document.getElementById('spinBtn');
    const resultPanel = document.getElementById('resultPanel');
    const prizeText = document.getElementById('prizeText');
    const codeText = document.getElementById('codeText');
    const copyBtn = document.getElementById('copyBtn');
    const orderBtn = document.getElementById('orderBtn');
    const statusText = document.getElementById('statusText');

    let isSpinning = false;
    let audioContext = null;

    function getSymbolByKey(key) {
      return SYMBOLS.find(s => s.key === key);
    }

    function symbolHTML(symbol) {
      return `
        <div class="symbol" data-key="${symbol.key}">
          <div class="symbol-badge" aria-hidden="true">${symbol.icon}</div>
          <div class="symbol-name">${symbol.name}</div>
        </div>
      `;
    }

    // ===== 5-PLAY LIMIT (localStorage, per email) =====
    const MAX_PLAYS = 5;
    let STORAGE_KEY = ''; // set after login

    // ===== GOOGLE SHEETS TRACKING =====
    // Incolla qui l'URL del tuo Google Apps Script (vedi istruzioni)
    const TRACKING_URL = 'https://script.google.com/macros/s/AKfycbz87yHoDDTjXfICmYz7AqI1bngGXoh43LiOksqIrl-71QgrIXApmkd34IypAleW-eE/exec';

    function track(event, extraData) {
      if (!TRACKING_URL) return; // skip se URL non configurato
      const email = (window._userEmail || '');
      const payload = { email, event, timestamp: new Date().toISOString(), ...extraData };
      // no-cors: non riceviamo risposta ma i dati vengono salvati
      fetch(TRACKING_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(() => {}); // silenzioso se offline
    }

    function getPlaysUsed() {
      if (!STORAGE_KEY) return 0;
      try { return parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10); }
      catch { return 0; }
    }
    function incrementPlays() {
      try { localStorage.setItem(STORAGE_KEY, String(getPlaysUsed() + 1)); }
      catch {}
    }
    function playsRemaining() { return Math.max(0, MAX_PLAYS - getPlaysUsed()); }

    function updatePlaysUI() {
      const rem = playsRemaining();
      if (rem <= 0) {
        spinBtn.disabled = true;
        leverWrap.style.pointerEvents = 'none';
        leverWrap.style.opacity = '0.35';
        statusText.textContent = 'Hai esaurito le 5 giocate disponibili.';
        statusText.style.color = '#e07070';
      } else {
        statusText.textContent = `Giocate rimaste: ${rem} / ${MAX_PLAYS}`;
        statusText.style.color = '';
      }
    }

    function randomSymbolKey() {
      return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].key;
    }

    function generateFinalSymbols() {
      // Probabilities: padThai 15%, bao 20%, gyoza 25%, no win 40%
      const r = Math.random();
      if (r < 0.15) return ['padThai', 'padThai', 'padThai'];
      if (r < 0.35) return ['bao', 'bao', 'bao'];
      if (r < 0.60) return ['gyoza', 'gyoza', 'gyoza'];
      // 40% no win — guaranteed non-triple
      let final;
      do {
        final = [randomSymbolKey(), randomSymbolKey(), randomSymbolKey()];
      } while (final[0] === final[1] && final[1] === final[2]);
      return final;
    }

    function getPrizeFromFinalSymbols(finalSymbols) {
      if (finalSymbols[0] === finalSymbols[1] && finalSymbols[1] === finalSymbols[2]) {
        return PRIZES_BY_SYMBOL[finalSymbols[0]] || null;
      }
      return null;
    }

    function buildReelStrip(finalKey, loops = 18) {
      const strip = [];
      for (let i = 0; i < loops; i++) {
        strip.push(randomSymbolKey());
      }
      strip.push(finalKey);
      return strip;
    }

    function renderInitialReels() {
      reels.forEach((reel, i) => {
        const key = SYMBOLS[i % SYMBOLS.length].key;
        const html = symbolHTML(getSymbolByKey(key));
        reel.innerHTML = html;
      });
    }

    function ensureAudio() {
      if (!audioContext) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioContext = new Ctx();
      }
      if (audioContext.state === 'suspended') audioContext.resume();
    }

    function playCoinSound() {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      [0, 0.04, 0.08].forEach((offset, idx) => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(1200 + idx * 260, now + offset);
        gain.gain.setValueAtTime(0.0001, now + offset);
        gain.gain.exponentialRampToValueAtTime(0.12, now + offset + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.12);
        osc.connect(gain).connect(audioContext.destination);
        osc.start(now + offset);
        osc.stop(now + offset + 0.13);
      });
    }

    function playGongSound() {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      const osc1 = audioContext.createOscillator();
      const osc2 = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc1.type = 'sine';
      osc2.type = 'triangle';
      osc1.frequency.setValueAtTime(220, now);
      osc2.frequency.setValueAtTime(330, now);
      osc1.frequency.exponentialRampToValueAtTime(180, now + 1.8);
      osc2.frequency.exponentialRampToValueAtTime(260, now + 1.8);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.24, now + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.1);
      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(audioContext.destination);
      osc1.start(now); osc2.start(now);
      osc1.stop(now + 2.15); osc2.stop(now + 2.15);
    }

    function launchConfetti(durationMs = 1800) {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const colors = ['#d6a838', '#0fa3a9', '#7d4bc7', '#ffd873', '#ffffff'];
      function resize() {
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      const pieces = Array.from({ length: 130 }, () => ({
        x: Math.random() * window.innerWidth,
        y: -20 - Math.random() * window.innerHeight * 0.4,
        w: 4 + Math.random() * 7,
        h: 6 + Math.random() * 8,
        speedY: 2 + Math.random() * 5,
        speedX: -2 + Math.random() * 4,
        rot: Math.random() * Math.PI,
        rotSpeed: -0.2 + Math.random() * 0.4,
        color: colors[Math.floor(Math.random() * colors.length)]
      }));
      const start = performance.now();
      function frame(now) {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        for (const p of pieces) {
          p.x += p.speedX; p.y += p.speedY; p.rot += p.rotSpeed;
          if (p.y > window.innerHeight + 20) { p.y = -20; p.x = Math.random() * window.innerWidth; }
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }
        if (now - start < durationMs) requestAnimationFrame(frame);
        else ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }
      requestAnimationFrame(frame);
    }

    function setWinResult(prize, finalSymbols) {
      prizeText.textContent = `${prize.label}`;
      codeText.textContent = prize.code;
      resultPanel.classList.add('show');
      statusText.textContent = `Combinazione: ${finalSymbols.map(k => getSymbolByKey(k).name).join(' • ')}`;
      statusText.classList.add('jackpot');
      setTimeout(() => statusText.classList.remove('jackpot'), 2400);
      playGongSound();
      launchConfetti();
    }

    function spin() {
      if (isSpinning) return;
      if (playsRemaining() <= 0) { updatePlaysUI(); return; }
      isSpinning = true;
      spinBtn.disabled = true;
      incrementPlays();
      resultPanel.classList.remove('show');
      statusText.textContent = 'I rulli stanno girando...';
      statusText.style.color = '';
      ensureAudio();
      playCoinSound();
      const finalSymbols = generateFinalSymbols();
      const wonPrize = getPrizeFromFinalSymbols(finalSymbols);
      let completed = 0;
      reels.forEach((reel, idx) => {
        const stripKeys = buildReelStrip(finalSymbols[idx], 16 + idx * 2);
        reel.innerHTML = stripKeys.map(k => symbolHTML(getSymbolByKey(k))).join('');
        reel.style.transition = 'none';
        reel.style.transform = 'translateY(0px)';
        void reel.offsetHeight;
        const targetY = -((stripKeys.length - 1) * 104);
        const duration = 1800 + idx * 420;
        reel.style.transition = `transform ${duration}ms cubic-bezier(0.12, 0.86, 0.26, 1)`;
        reel.style.transform = `translateY(${targetY}px)`;
        const onEnd = () => {
          reel.removeEventListener('transitionend', onEnd);
          completed += 1;
          if (completed === reels.length) {
            if (wonPrize) {
              // Esaurisce tutte le giocate rimaste per bloccare ulteriori spin
              try { localStorage.setItem(STORAGE_KEY, String(MAX_PLAYS)); } catch {}
              setWinResult(wonPrize, finalSymbols);
              track('vincita', { result: 'vincita', prize: wonPrize.code, prizeLabel: wonPrize.label, combination: finalSymbols.join('-'), playsUsed: MAX_PLAYS });
            } else {
              resultPanel.classList.remove('show');
              statusText.textContent = `Nessuno sconto: ${finalSymbols.map(k => getSymbolByKey(k).name).join(' • ')}`;
              statusText.classList.remove('jackpot');
              track('spin', { result: 'nessuna_vincita', combination: finalSymbols.join('-'), playsUsed: getPlaysUsed() });
            }
            isSpinning = false;
            spinBtn.disabled = false;
            updatePlaysUI();
          }
        };
        reel.addEventListener('transitionend', onEnd);
      });
    }

    spinBtn.addEventListener('click', () => {}); // decorative only

    // ===== LEVER INTERACTION =====
    const leverWrap = document.getElementById('leverWrap');
    const leverArmGroup = document.getElementById('leverArmGroup');

    function triggerLever() {
      if (isSpinning) return;
      leverArmGroup.classList.remove('spring-back');
      leverArmGroup.classList.add('pulled');
      leverWrap.style.pointerEvents = 'none';

      setTimeout(() => {
        leverArmGroup.classList.remove('pulled');
        leverArmGroup.classList.add('spring-back');
        spin();
      }, 220);

      setTimeout(() => {
        leverArmGroup.classList.remove('spring-back');
        leverWrap.style.pointerEvents = '';
      }, 700);
    }

    leverWrap.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); triggerLever(); }
    });

    // ===== DRAG LEVER (mouse + touch) =====
    const MAX_PULL = 130;
    const MIN_TRIGGER = 60; // px drag needed to trigger spin
    let isDragging = false;
    let dragStartY = 0;
    let currentPull = 0;

    function setLeverY(y) {
      const clamped = Math.max(0, Math.min(MAX_PULL, y));
      currentPull = clamped;
      // Remove animation classes while dragging manually
      leverArmGroup.classList.remove('pulled', 'spring-back');
      leverArmGroup.style.transform = `translateX(-50%) translateY(${clamped}px)`;
    }

    function releaseLever() {
      if (!isDragging) return;
      isDragging = false;
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);

      const pulled = currentPull;
      currentPull = 0;

      if (pulled >= MIN_TRIGGER && !isSpinning) {
        // Snap to full pull, then spring back and spin
        leverArmGroup.style.transform = '';
        leverArmGroup.style.transition = 'transform 0.08s ease-out';
        leverArmGroup.classList.add('pulled');
        leverWrap.style.pointerEvents = 'none';
        setTimeout(() => {
          leverArmGroup.classList.remove('pulled');
          leverArmGroup.classList.add('spring-back');
          leverArmGroup.style.transform = '';
          leverArmGroup.style.transition = '';
          spin();
        }, 160);
        setTimeout(() => {
          leverArmGroup.classList.remove('spring-back');
          leverWrap.style.pointerEvents = '';
        }, 600);
      } else {
        // Not pulled enough — spring back without spinning
        leverArmGroup.style.transform = '';
        leverArmGroup.style.transition = '';
        leverArmGroup.classList.add('spring-back');
        setTimeout(() => leverArmGroup.classList.remove('spring-back'), 400);
      }
    }

    function onMouseMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      setLeverY(e.clientY - dragStartY);
    }
    function onMouseUp(e) { releaseLever(); }
    function onTouchMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      setLeverY(e.touches[0].clientY - dragStartY);
    }
    function onTouchEnd(e) { releaseLever(); }

    leverWrap.addEventListener('mousedown', e => {
      if (isSpinning) return;
      e.preventDefault();
      isDragging = true;
      dragStartY = e.clientY;
      currentPull = 0;
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    leverWrap.addEventListener('touchstart', e => {
      if (isSpinning) return;
      isDragging = true;
      dragStartY = e.touches[0].clientY;
      currentPull = 0;
      document.addEventListener('touchmove', onTouchMove, { passive: false });
      document.addEventListener('touchend', onTouchEnd);
    }, { passive: true });


    // ===== LOGIN =====
    (function() {
      const overlay  = document.getElementById('loginOverlay');
      const emailEl  = document.getElementById('loginEmail');
      const btnEl    = document.getElementById('loginBtn');
      const errEl    = document.getElementById('loginError');

      function normalise(email) { return email.trim().toLowerCase(); }
      function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

      function loginAndStart() {
        const email = normalise(emailEl.value);
        if (!isValidEmail(email)) {
          errEl.textContent = 'Inserisci un indirizzo email valido.';
          emailEl.focus();
          return;
        }
        // Build per-email key (v2 prefix resets old device-only keys)
        STORAGE_KEY = 'mythai_v2_' + btoa(email).replace(/=/g,'');
        window._userEmail = email;
        overlay.style.display = 'none';
        updatePlaysUI();
        track('login', { playsUsed: getPlaysUsed() });
      }

      btnEl.addEventListener('click', loginAndStart);
      emailEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') loginAndStart();
      });
    })();

    copyBtn.addEventListener('click', async () => {
      const code = codeText.textContent.trim();
      try {
        await navigator.clipboard.writeText(code);
        copyBtn.textContent = 'Copiato!';
        setTimeout(() => (copyBtn.textContent = 'Copia'), 1300);
      } catch {
        const area = document.createElement('textarea');
        area.value = code;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
        copyBtn.textContent = 'Copiato!';
        setTimeout(() => (copyBtn.textContent = 'Copia'), 1300);
      }
    });

    orderBtn.addEventListener('click', () => {
      window.open(ORDER_URL, '_blank', 'noopener,noreferrer');
    });

    window.addEventListener('resize', () => {
      const canvas = document.getElementById('confetti');
      if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    });

    renderInitialReels();
    updatePlaysUI();
  </script>
</body>
</html>
